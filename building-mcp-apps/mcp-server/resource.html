<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CKEditor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #1C2331;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      padding: 40px 36px;
      background: #141A25;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .logo .ck { color: #AFE229; }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.92rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 28px;
    }

    .cta {
      display: inline-block;
      background: #771BFF;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px 32px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .cta:hover { background: #8B3DFF; }

    .signin-note {
      margin-top: 16px;
      margin-bottom: 0;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="ck">CK</span>Editor</div>
    <h1>The rich text editor trusted by millions of developers</h1>
    <p>
      Real-time collaboration, track changes, AI assistant, export to Word and PDF —
      drop a production-ready editor into your app in minutes.
    </p>
    <a class="cta" href="https://portal.ckeditor.com/signup" target="_blank" rel="noopener">
      Get Free Trial
    </a>
    <p class="signin-note">Sign up with Google, GitHub, or email &amp; password. No credit card required.</p>
  </div>
</body>
</html>
