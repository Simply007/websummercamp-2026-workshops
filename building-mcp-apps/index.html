<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The New Way</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 32px;
      width: 100%;
      max-width: 720px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f2328;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #57606a;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #57606a;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="text"], textarea {
      width: 100%;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.9rem;
      color: #1f2328;
      background: #f7f8fa;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #3b82d4;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: #3b3b3b;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 9px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #555; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #output {
      margin-top: 28px;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #1f2328;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .done-line {
      margin-top: 12px;
      color: #57606a;
      font-style: italic;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.85rem;
    }

    .error {
      color: #cf222e;
      font-size: 0.88rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>The New Way</h1>
    <p class="subtitle">Submit → tokens arrive as they're generated.</p>

    <label for="apiKey">OpenRouter API Key</label>
    <input type="text" id="apiKey" placeholder="sk-or-..." autocomplete="off" spellcheck="false">

    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Write a short poem about JavaScript."></textarea>

    <button id="submitBtn" onclick="runStream()">Submit</button>

    <div id="output"></div>
  </div>

  <script>
    async function runStream() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      const output = document.getElementById('output');
      const btn = document.getElementById('submitBtn');

      if (!apiKey) { output.innerHTML = '<span class="error">Please enter an OpenRouter API key.</span>'; return; }
      if (!prompt) { output.innerHTML = '<span class="error">Please enter a prompt.</span>'; return; }

      output.textContent = '';
      btn.disabled = true;
      const start = Date.now();

      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`,
            'HTTP-Referer': location.href,
            'X-Title': 'The New Way'
          },
          body: JSON.stringify({
            model: 'openai/gpt-4o-mini',
            stream: true,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!res.ok) {
          const err = await res.text();
          output.innerHTML = `<span class="error">Error ${res.status}: ${err}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let text = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          for (const line of chunk.split('\n')) {
            const trimmed = line.trim();
            if (!trimmed || trimmed === 'data: [DONE]') continue;
            if (!trimmed.startsWith('data: ')) continue;
            try {
              const json = JSON.parse(trimmed.slice(6));
              const delta = json.choices?.[0]?.delta?.content;
              if (delta) {
                text += delta;
                output.textContent = text;
              }
            } catch (_) {}
          }
        }

        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        const doneLine = document.createElement('div');
        doneLine.className = 'done-line';
        doneLine.textContent = `— done in ${elapsed}s —`;
        output.appendChild(doneLine);

      } catch (e) {
        output.innerHTML = `<span class="error">${e.message}</span>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
